[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src 'self' https: wss://api.us.elevenlabs.io wss://api.elevenlabs.io; microphone 'self'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
