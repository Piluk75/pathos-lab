    <style>
      /* Grain Texture */
      .grain {
        position: fixed;
        top: 0;

        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;

      /* Scroll Animation Classes */
      .fade-in-section {
        opacity: 0;
        transform: translateY(30px);

      /* Specific Animation for Digital Trap with Blur */
      .fade-in-blur {
        opacity: 0;
        transform: translateY(40px);
        filter: blur(6px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out, filter 0.8s ease-out;
        will-change: opacity, transform, filter;
      }
      .fade-in-blur.is-visible {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }

      /* Utility for text gradients */
      .text-gradient {

    <!-- Chatbot ElevenLabs Patch & Widget -->
    <script>
    (function () {
      // --- utilidades ---
      function hideBrandingIn(root) {
        try {
          // Busca el enlace oficial del crédito
          root.querySelectorAll('a[href="https://elevenlabs.io/conversational-ai"]').forEach(a => {
            const p = a.closest('p');
            if (p) p.style.setProperty('display','none','important');
          });
          // Por si cambian el markup: detectar el texto
          root.querySelectorAll('p').forEach(p => {
            const t = (p.textContent || '').trim();
            if (t.includes('Powered by ElevenLabs')) {
              p.style.setProperty('display','none','important');
            }
          });
        } catch (e) {}
      }

      function observeRoot(root) {
        hideBrandingIn(root);
        const mo = new MutationObserver(() => hideBrandingIn(root));
        mo.observe(root, { childList: true, subtree: true });
      }

      // --- parche de attachShadow: convertir 'closed' en 'open' ---
      const _attach = Element.prototype.attachShadow;
      if (_attach) {
        Element.prototype.attachShadow = function(init) {
          const patched = Object.assign({}, init || {}, { mode: 'open' });
          const shadow = _attach.call(this, patched);
          observeRoot(shadow);
          return shadow;
        };
      }

      // observar también el documento principal
      observeRoot(document);
    })();
    </script>
