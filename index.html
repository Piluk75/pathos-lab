  <script>
    (function () {
      function hideBrandingIn(root) {
        try {
          root.querySelectorAll('a[href="https://elevenlabs.io/conversational-ai"]').forEach(a => {
            const p = a.closest('p');
            if (p) p.style.setProperty('display', 'none', 'important');
          });
          root.querySelectorAll('p').forEach(p => {
            const t = (p.textContent || '').trim();
            if (t.includes('Powered by ElevenLabs')) {
              p.style.setProperty('display', 'none', 'important');
            }
          });
        } catch (e) { }
      }

      function observeRoot(root) {
        hideBrandingIn(root);
        const mo = new MutationObserver(() => hideBrandingIn(root));
        mo.observe(root, { childList: true, subtree: true });
      }

      const _attach = Element.prototype.attachShadow;
      if (_attach) {
        Element.prototype.attachShadow = function (init) {
          const patched = Object.assign({}, init || {}, { mode: 'open' });
          const shadow = _attach.call(this, patched);
          observeRoot(shadow);
          return shadow;
        };
      }

      observeRoot(document);
    })();
  </script>

  <script>
    // Lazy load the heavy ElevenLabs widget after a delay or interaction
    (function () {
      let loaded = false;
      function loadWidget() {
        if (loaded) return;
        loaded = true;
        const script = document.createElement("script");
        script.src = "https://unpkg.com/@elevenlabs/convai-widget-embed";
        script.async = true;
        document.body.appendChild(script);
      }

      // Load after 3 seconds of idle time
      window.addEventListener('load', () => {
        setTimeout(loadWidget, 3500);
      });

      // Or on first interaction (scroll/click)
      ['mousedown', 'touchstart', 'scroll'].forEach(evt => {
        window.addEventListener(evt, loadWidget, { once: true, passive: true });
      });
    })();
  </script>
